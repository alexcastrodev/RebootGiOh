services:
  app:
    image: pifive:5001/deck-agent:latest
    environment:
      - DB_PATH=/data/deck_agent.sqlite3
    volumes:
      - type: bind
        source: /mnt/ssd/@docker/rebookondeck/db
        target: /data
    networks:
      - proxy_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  proxy_net:
    external: true
